# Requer ficheiro .env (ver .env.example). Não commite segredos.
# JUMP_HOST_SLOTS_OVERRIDES e FLOWER_BASIC_AUTH vêm do .env em produção.
services:
  db:
    image: postgres:15-alpine
    container_name: backup_sys_db
    command: >
      postgres
      -c idle_in_transaction_session_timeout=${PG_IDLE_IN_TX_TIMEOUT_MS:-60000}
      -c lock_timeout=${PG_LOCK_TIMEOUT_MS:-5000}
      -c deadlock_timeout=${PG_DEADLOCK_TIMEOUT_MS:-1000}
      -c max_connections=${PG_MAX_CONNECTIONS:-250}
      -c shared_buffers=${PG_SHARED_BUFFERS:-512MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-2048MB}
      -c work_mem=${PG_WORK_MEM:-8MB}
      -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-128MB}
      -c wal_compression=on
      -c checkpoint_completion_target=0.9
      -c max_wal_size=${PG_MAX_WAL_SIZE:-1GB}
      -c min_wal_size=${PG_MIN_WAL_SIZE:-80MB}
    environment:
      POSTGRES_DB: backup_center
      POSTGRES_USER: backup_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backup_user -d backup_center"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backup_net

  redis:
    image: redis:7-alpine
    container_name: backup_sys_redis
    command: >
      redis-server
      --appendonly ${REDIS_APPENDONLY:-no}
      --save ${REDIS_SAVE_SEC_1:-3600} ${REDIS_SAVE_CHG_1:-1}
      --save ${REDIS_SAVE_SEC_2:-300} ${REDIS_SAVE_CHG_2:-100000}
      --save ${REDIS_SAVE_SEC_3:-60} ${REDIS_SAVE_CHG_3:-1000000}
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAXMEMORY:-0}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-noeviction}
      --tcp-backlog ${REDIS_TCP_BACKLOG:-511}
      --timeout ${REDIS_CLIENT_TIMEOUT_SECONDS:-0}
      --hz ${REDIS_HZ:-10}
      --active-expire-effort ${REDIS_ACTIVE_EXPIRE_EFFORT:-1}
    volumes:
      - ./redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backup_net

  app:
    build: .
    container_name: backup_sys_app
    command: >
      sh -lc "exec gunicorn main:app
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers ${APP_WEB_WORKERS:-6}
      --max-requests ${APP_WEB_MAX_REQUESTS:-1500}
      --max-requests-jitter ${APP_WEB_MAX_REQUESTS_JITTER:-150}
      --timeout ${APP_WEB_TIMEOUT_SECONDS:-120}
      --graceful-timeout ${APP_WEB_GRACEFUL_TIMEOUT_SECONDS:-30}
      --keep-alive ${APP_WEB_KEEPALIVE_SECONDS:-10}"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://backup_user:${DB_PASSWORD_URLENC}@db:5432/backup_center
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DEBUG=0
      - APP_TIMEZONE=${APP_TIMEZONE:-America/Recife}
      - TZ=${APP_TIMEZONE:-America/Recife}
      - CELERY_METRICS_INSPECT_ENABLED=${APP_CELERY_METRICS_INSPECT_ENABLED:-0}
      - BACKUP_METRICS_CACHE_SECONDS=${BACKUP_METRICS_CACHE_SECONDS:-60}
      - APP_WEB_WORKERS=${APP_WEB_WORKERS:-6}
      - APP_WEB_MAX_REQUESTS=${APP_WEB_MAX_REQUESTS:-1500}
      - APP_WEB_MAX_REQUESTS_JITTER=${APP_WEB_MAX_REQUESTS_JITTER:-150}
      - APP_WEB_TIMEOUT_SECONDS=${APP_WEB_TIMEOUT_SECONDS:-120}
      - APP_WEB_GRACEFUL_TIMEOUT_SECONDS=${APP_WEB_GRACEFUL_TIMEOUT_SECONDS:-30}
      - APP_WEB_KEEPALIVE_SECONDS=${APP_WEB_KEEPALIVE_SECONDS:-10}
      - BULK_PREFLIGHT_AUTO_AUDIT=${BULK_PREFLIGHT_AUTO_AUDIT:-1}
      - BULK_PREFLIGHT_AUTO_AUDIT_LIMIT=${BULK_PREFLIGHT_AUTO_AUDIT_LIMIT:-120}
      - BULK_PREFLIGHT_MAX_AGE_MINUTES=${BULK_PREFLIGHT_MAX_AGE_MINUTES:-45}
      - BACKUP_NETWORK_PRECHECK_ENABLED=${BACKUP_NETWORK_PRECHECK_ENABLED:-1}
      - BACKUP_NETWORK_PRECHECK_FAIL_FAST=${BACKUP_NETWORK_PRECHECK_FAIL_FAST:-1}
      - BACKUP_NETWORK_PRECHECK_TIMEOUT_SECONDS=${BACKUP_NETWORK_PRECHECK_TIMEOUT_SECONDS:-2}
      - BACKUP_NETWORK_PRECHECK_CONFIRM_RETRIES=${BACKUP_NETWORK_PRECHECK_CONFIRM_RETRIES:-1}
      - BACKUP_NETWORK_PRECHECK_CONFIRM_TIMEOUT_SECONDS=${BACKUP_NETWORK_PRECHECK_CONFIRM_TIMEOUT_SECONDS:-4}
      - BACKUP_NETWORK_PRECHECK_SKIP_FOR_JUMP=${BACKUP_NETWORK_PRECHECK_SKIP_FOR_JUMP:-1}
      - BACKUP_SSH_STRICT_HOST_KEY_CHECKING=${BACKUP_SSH_STRICT_HOST_KEY_CHECKING:-0}
      - BACKUP_TASK_SOFT_TIME_LIMIT_SECONDS=${BACKUP_TASK_SOFT_TIME_LIMIT_SECONDS:-480}
      - BACKUP_TASK_TIME_LIMIT_SECONDS=${BACKUP_TASK_TIME_LIMIT_SECONDS:-540}
      - BACKUP_TRANSIENT_RETRY_DENYLIST_NAMES=${BACKUP_TRANSIENT_RETRY_DENYLIST_NAMES:-FLASHNET - SW CORE-CABO_S.A.}
      - BACKUP_TRANSIENT_RETRY_DENYLIST_IDS=${BACKUP_TRANSIENT_RETRY_DENYLIST_IDS:-}
      - JUMP_HOST_SHELL_RETRIES=${JUMP_HOST_SHELL_RETRIES:-4}
      - JUMP_HOST_SHELL_PROBE_TIMEOUT_SECONDS=${JUMP_HOST_SHELL_PROBE_TIMEOUT_SECONDS:-12}
      - JUMP_HOST_CONNECT_RETRIES=${JUMP_HOST_CONNECT_RETRIES:-3}
      - JUMP_HOST_CHANNEL_RETRIES=${JUMP_HOST_CHANNEL_RETRIES:-2}
      - JUMP_PHASE_GROUP_STAGGER_SECONDS=${JUMP_PHASE_GROUP_STAGGER_SECONDS:-2}
      - JUMP_BULK_BASTION_STAGGER_SECONDS=${JUMP_BULK_BASTION_STAGGER_SECONDS:-5}
      - JUMP_HOST_WINDOW_ADAPTIVE_ENABLED=${JUMP_HOST_WINDOW_ADAPTIVE_ENABLED:-1}
      - JUMP_HOST_WINDOW_SECONDS=${JUMP_HOST_WINDOW_SECONDS:-1800}
      - JUMP_HOST_WINDOW_MIN_SAMPLES=${JUMP_HOST_WINDOW_MIN_SAMPLES:-3}
      - JUMP_HOST_WINDOW_MIN_SLOTS=${JUMP_HOST_WINDOW_MIN_SLOTS:-2}
      - JUMP_HOST_DURATION_EMA_ALPHA_PERCENT=${JUMP_HOST_DURATION_EMA_ALPHA_PERCENT:-25}
      - CB_OPEN_MAX_RETRIES=${CB_OPEN_MAX_RETRIES:-1}
      - CB_OPEN_RETRY_BUFFER_SECONDS=${CB_OPEN_RETRY_BUFFER_SECONDS:-2}
      - JUMP_HOST_ADAPTIVE_SEVERE_FAIL_STREAK=${JUMP_HOST_ADAPTIVE_SEVERE_FAIL_STREAK:-2}
      - JUMP_HOST_ADAPTIVE_SEVERE_COOLDOWN_SECONDS=${JUMP_HOST_ADAPTIVE_SEVERE_COOLDOWN_SECONDS:-900}
      - JUMP_HOST_ADAPTIVE_SEVERE_DROP_TO_ONE=${JUMP_HOST_ADAPTIVE_SEVERE_DROP_TO_ONE:-1}
      - BACKUP_MIKROTIK_DISABLE_JUMP_HOST=${BACKUP_MIKROTIK_DISABLE_JUMP_HOST:-1}
      - BACKUP_MIKROTIK_PREFER_VPN=${BACKUP_MIKROTIK_PREFER_VPN:-1}
      - VPN_GLOBAL_LOCK_TIMEOUT_SECONDS=${VPN_GLOBAL_LOCK_TIMEOUT_SECONDS:-3600}
      - BACKUP_OTEL_ENABLED=${BACKUP_OTEL_ENABLED:-1}
      - BACKUP_OTEL_EXPORTER_OTLP_ENDPOINT=${BACKUP_OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318/v1/traces}
      - BACKUP_OTEL_SERVICE_NAME=${BACKUP_OTEL_SERVICE_NAME_APP:-backup-center-app}
      - BULK_ACTIVE_STALE_SECONDS=${BULK_ACTIVE_STALE_SECONDS:-1800}
      - CELERY_RESULT_EXPIRES_SECONDS=${CELERY_RESULT_EXPIRES_SECONDS:-86400}
    volumes:
      - ./storage:/app/storage
      - ./app:/app/app
    ports:
      - "5000:8000"
      - "8050:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - backup_net

  celery:
    build: .
    container_name: backup_sys_celery
    command: celery -A app.celery_app worker -E -l info -Q celery --concurrency=${CELERY_WORKER_CONCURRENCY:-4} --prefetch-multiplier=1 --max-tasks-per-child=20
    environment:
      - DATABASE_URL=postgresql://backup_user:${DB_PASSWORD_URLENC}@db:5432/backup_center
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DEBUG=0
      - APP_TIMEZONE=${APP_TIMEZONE:-America/Recife}
      - TZ=${APP_TIMEZONE:-America/Recife}
      - JUMP_HOST_MAX_SLOTS=${JUMP_HOST_MAX_SLOTS:-3}
      - JUMP_HOST_SLOTS_OVERRIDES=${JUMP_HOST_SLOTS_OVERRIDES:-default=1}
      - JUMP_HOST_SLOT_WAIT_SECONDS=240
      - JUMP_HOST_SLOT_WAIT_SECONDS_LARGE_BULK=${JUMP_HOST_SLOT_WAIT_SECONDS_LARGE_BULK:-900}
      - JUMP_HOST_SLOT_TTL_SECONDS=${JUMP_HOST_SLOT_TTL_SECONDS:-660}
      - JUMP_HOST_ADAPTIVE_ENABLED=${JUMP_HOST_ADAPTIVE_ENABLED:-1}
      - BULK_TRANSIENT_RETRY_THRESHOLD=${BULK_TRANSIENT_RETRY_THRESHOLD:-300}
      - BULK_TRANSIENT_MAX_RETRIES=${BULK_TRANSIENT_MAX_RETRIES:-1}
      - BULK_ACTIVE_STALE_SECONDS=${BULK_ACTIVE_STALE_SECONDS:-1800}
      - CELERY_RESULT_EXPIRES_SECONDS=${CELERY_RESULT_EXPIRES_SECONDS:-86400}
