      - BULK_TRANSIENT_RETRY_THRESHOLD=${BULK_TRANSIENT_RETRY_THRESHOLD:-300}
      - BULK_TRANSIENT_MAX_RETRIES=${BULK_TRANSIENT_MAX_RETRIES:-1}
      - BULK_ACTIVE_STALE_SECONDS=${BULK_ACTIVE_STALE_SECONDS:-1800}
      - CELERY_RESULT_EXPIRES_SECONDS=${CELERY_RESULT_EXPIRES_SECONDS:-86400}
      - BACKUP_NETWORK_PRECHECK_ENABLED=${BACKUP_NETWORK_PRECHECK_ENABLED:-1}
