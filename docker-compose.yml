      - TZ=${APP_TIMEZONE:-America/Recife}
      - VPN_ISOLATED_WORKER=1
      - CELERY_VPN_WORKER_CONCURRENCY=${CELERY_VPN_WORKER_CONCURRENCY:-1}
      - CELERY_VPN_MAX_TASKS_PER_CHILD=${CELERY_VPN_MAX_TASKS_PER_CHILD:-1}
