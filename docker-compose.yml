      - BACKUP_TRANSIENT_RETRY_DENYLIST_NAMES=${BACKUP_TRANSIENT_RETRY_DENYLIST_NAMES:-FLASHNET - SW CORE-CABO_S.A.}
      - BACKUP_TRANSIENT_RETRY_DENYLIST_IDS=${BACKUP_TRANSIENT_RETRY_DENYLIST_IDS:-}
      - JUMP_HOST_SHELL_RETRIES=${JUMP_HOST_SHELL_RETRIES:-4}
      - JUMP_HOST_SHELL_PROBE_TIMEOUT_SECONDS=${JUMP_HOST_SHELL_PROBE_TIMEOUT_SECONDS:-12}
      - JUMP_HOST_CONNECT_RETRIES=${JUMP_HOST_CONNECT_RETRIES:-3}
      - JUMP_HOST_CHANNEL_RETRIES=${JUMP_HOST_CHANNEL_RETRIES:-2}
      - JUMP_PHASE_GROUP_STAGGER_SECONDS=${JUMP_PHASE_GROUP_STAGGER_SECONDS:-2}
      - JUMP_BULK_BASTION_STAGGER_SECONDS=${JUMP_BULK_BASTION_STAGGER_SECONDS:-5}
      - JUMP_HOST_WINDOW_ADAPTIVE_ENABLED=${JUMP_HOST_WINDOW_ADAPTIVE_ENABLED:-1}
      - JUMP_HOST_WINDOW_SECONDS=${JUMP_HOST_WINDOW_SECONDS:-1800}
      - JUMP_HOST_WINDOW_MIN_SAMPLES=${JUMP_HOST_WINDOW_MIN_SAMPLES:-3}
      - JUMP_HOST_WINDOW_MIN_SLOTS=${JUMP_HOST_WINDOW_MIN_SLOTS:-2}
      - JUMP_HOST_DURATION_EMA_ALPHA_PERCENT=${JUMP_HOST_DURATION_EMA_ALPHA_PERCENT:-25}
      - VPN_CONNECT_RETRIES=${VPN_CONNECT_RETRIES:-4}
      - VPN_CONNECT_RETRY_BACKOFF_SECONDS=${VPN_CONNECT_RETRY_BACKOFF_SECONDS:-10}
      - VPN_RESET_BACKEND_ON_CONNECT_FAILURE=${VPN_RESET_BACKEND_ON_CONNECT_FAILURE:-1}
      - VPN_RESTART_NETWORKMANAGER_ON_CONNECT_FAILURE=${VPN_RESTART_NETWORKMANAGER_ON_CONNECT_FAILURE:-1}
      - VPN_RECYCLE_WORKER_AFTER_CONNECT_FAILURE=${VPN_RECYCLE_WORKER_AFTER_CONNECT_FAILURE:-0}
      - VPN_WORKER_RECYCLE_DELAY_SECONDS=${VPN_WORKER_RECYCLE_DELAY_SECONDS:-10}
      - CB_OPEN_MAX_RETRIES=${CB_OPEN_MAX_RETRIES:-1}
      - CB_OPEN_RETRY_BUFFER_SECONDS=${CB_OPEN_RETRY_BUFFER_SECONDS:-2}
      - JUMP_HOST_ADAPTIVE_SEVERE_FAIL_STREAK=${JUMP_HOST_ADAPTIVE_SEVERE_FAIL_STREAK:-2}
      - JUMP_HOST_ADAPTIVE_SEVERE_COOLDOWN_SECONDS=${JUMP_HOST_ADAPTIVE_SEVERE_COOLDOWN_SECONDS:-900}
      - JUMP_HOST_ADAPTIVE_SEVERE_DROP_TO_ONE=${JUMP_HOST_ADAPTIVE_SEVERE_DROP_TO_ONE:-1}
      - BACKUP_MIKROTIK_DISABLE_JUMP_HOST=${BACKUP_MIKROTIK_DISABLE_JUMP_HOST:-1}
      - BACKUP_MIKROTIK_PREFER_VPN=${BACKUP_MIKROTIK_PREFER_VPN:-1}
      - VPN_GLOBAL_LOCK_TIMEOUT_SECONDS=${VPN_GLOBAL_LOCK_TIMEOUT_SECONDS:-3600}
      - CB_THRESHOLD_PERCENT=85
      - CB_MIN_SAMPLES=20
      - CB_OPEN_SECONDS=20
      - BACKUP_OTEL_ENABLED=${BACKUP_OTEL_ENABLED:-1}
      - BACKUP_OTEL_EXPORTER_OTLP_ENDPOINT=${BACKUP_OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318/v1/traces}
      - BACKUP_OTEL_SERVICE_NAME=${BACKUP_OTEL_SERVICE_NAME_VPN:-backup-center-celery-vpn}
    volumes:
      - ./storage:/app/storage
      - ./app:/app/app
      - ./scripts:/app/scripts
    devices:
      - /dev/net/tun:/dev/net/tun
      - /dev/ppp:/dev/ppp
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - backup_net

  flower:
    build: .
    container_name: backup_sys_flower
    env_file:
      - .env
    command: celery -A app.celery_app flower --address=0.0.0.0 --port=5555 --persistent=False
    environment:
      - DATABASE_URL=postgresql://backup_user:${DB_PASSWORD_URLENC}@db:5432/backup_center
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - APP_TIMEZONE=${APP_TIMEZONE:-America/Recife}
      - TZ=${APP_TIMEZONE:-America/Recife}
      - BULK_ACTIVE_STALE_SECONDS=${BULK_ACTIVE_STALE_SECONDS:-1800}
      - CELERY_RESULT_EXPIRES_SECONDS=${CELERY_RESULT_EXPIRES_SECONDS:-86400}
      # API do Flower sem auth é perigosa em produção; use FLOWER_BASIC_AUTH no .env
      - FLOWER_UNAUTHENTICATED_API=false
      # Defina no .env; valor abaixo só para arranque local sem .env (troque em produção).
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-local-dev:change-me}
    ports:
      # Liga só em localhost por defeito; use túnel SSH ou ajuste se precisar de acesso remoto.
      - "127.0.0.1:5555:5555"
    volumes:
      - ./app:/app/app
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - backup_net

  celery_beat:
    build: .
    container_name: backup_sys_celery_beat
    command: celery -A app.celery_app beat -l info
    environment:
      - DATABASE_URL=postgresql://backup_user:${DB_PASSWORD_URLENC}@db:5432/backup_center
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DEBUG=0
      - APP_TIMEZONE=${APP_TIMEZONE:-America/Recife}
      - TZ=${APP_TIMEZONE:-America/Recife}
      - CELERY_BEAT_SCHEDULED_BACKUPS_SECONDS=${CELERY_BEAT_SCHEDULED_BACKUPS_SECONDS:-300}
    volumes:
      - ./app:/app/app
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - backup_net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: backup_sys_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./storage/observability/prometheus:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app
      - flower
    restart: unless-stopped
    networks:
      - backup_net

  loki:
    image: grafana/loki:2.9.8
    container_name: backup_sys_loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./storage/observability/loki:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - backup_net

  promtail:
    image: grafana/promtail:2.9.8
    container_name: backup_sys_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./docker/observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./storage/observability/promtail:/tmp
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - backup_net

  tempo:
    image: grafana/tempo:2.5.0
    container_name: backup_sys_tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./docker/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - ./storage/observability/tempo:/tmp/tempo
    ports:
      - "3200:3200"
      - "4318:4318"
      - "4317:4317"
    restart: unless-stopped
    networks:
      - backup_net

  grafana_obs:
    image: grafana/grafana:11.1.4
    container_name: backup_sys_grafana_obs
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_OBS_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_OBS_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_OBS_ANON_ENABLED:-false}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GRAFANA_OBS_ANON_ROLE:-Viewer}
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./storage/observability/grafana:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped
    networks:
      - backup_net

networks:
  backup_net:
    name: backup_net
