server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_containers
    static_configs:
      - targets: [localhost]
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: log
      - json:
          expressions:
            message: message
            level: level
            logger_name: logger
      - template:
          source: normalized_line
          template: '{{ if .message }}{{ .message }}{{ else }}{{ .log }}{{ end }}'
      - output:
          source: normalized_line
      - regex:
          expression: 'backup_event (?P<backup_event>\{.*\})'
      - json:
          source: backup_event
          expressions:
            event: event
            outcome: outcome
            category: category
            tenant_id: tenant_id
            jump_host: jump_host
            group_name: group_name
            script_name: script_name
      - labels:
          event:
          outcome:
          category:
          tenant_id:
