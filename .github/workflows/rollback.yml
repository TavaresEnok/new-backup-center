name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de rollback"
        required: true
        type: choice
        options:
          - staging
          - production
      commit:
        description: "Commit para rollback (hash completo ou curto)"
        required: true
        type: string
      run_migrations:
        description: "Executar migrações para trás (alembic downgrade -1)"
        required: true
        default: false
        type: boolean

jobs:
  rollback:
    name: Rollback ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          TARGET_COMMIT: ${{ inputs.commit }}
          RUN_DOWNGRADE: ${{ inputs.run_migrations }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_PATH,DEPLOY_URL,TARGET_COMMIT,RUN_DOWNGRADE
          script: |
            set -euo pipefail

            cd "${DEPLOY_PATH}"
            git fetch --all --prune
            git checkout "${TARGET_COMMIT}"

            if ! docker compose up -d --build app celery celery_beat celery_vpn; then
              docker compose up -d --build app celery celery_beat
            fi

            if [ "${RUN_DOWNGRADE}" = "true" ]; then
              docker compose exec -T app alembic downgrade -1
            fi

            curl -fsS "${DEPLOY_URL}/healthz" >/dev/null
            curl -fsS "${DEPLOY_URL}/readyz" >/dev/null

            echo "Rollback concluído com sucesso para commit ${TARGET_COMMIT}"
